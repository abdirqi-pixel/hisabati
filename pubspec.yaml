name: hisabati
description: تطبيق حساباتي لإدارة المشاريع والمصروفات
publish_to: 'none'

version: 1.0.0+65

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  printing: ^5.13.4
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  intl: ^0.20.2
  crypto: ^3.0.6
  sqflite: ^2.3.3+1
  path: ^1.9.0
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  open_filex: ^4.5.0
  timezone: ^0.9.4
  flutter_local_notifications: ^17.2.3
  local_auth: ^2.3.0
  excel: ^4.0.6
  pdf: ^3.11.1
  share_plus: ^10.0.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
